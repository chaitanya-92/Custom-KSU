name: Build ksud
on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      os:
        required: false
        type: string
        default: ubuntu-latest
      pack_lkm:
        required: false
        type: boolean
        default: true
      pack_ksuinit:
        required: false
        type: boolean
        default: true
      use_cache:
        required: false
        type: boolean
        default: true
jobs:
  build:
    runs-on: ${{ inputs.os }}
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Download artifacts
      uses: actions/download-artifact@v7
    
    - name: Prepare LKM fies
      if: ${{ inputs.pack_lkm }}
      run: |
        mkdir -p ./userspace/ksud/bin/aarch64/
        find . -path "./android*-lkm/*_kernelsu.ko" -type f -exec cp {} ./userspace/ksud/bin/aarch64/ \;
    
    - name: Prepare ksuinit
      if: ${{ inputs.pack_ksuinit }}
      run: |
        mkdir -p ./userspace/ksud/bin/aarch64/
        KSUINIT_PATH="$(find . -path "./ksuinit/*" -type f -name ksuinit | head -n 1)"
        if [ -z "$KSUINIT_PATH" ]; then
          echo "ksuinit artifact not found"
          exit 1
        fi
        cp "$KSUINIT_PATH" ./userspace/ksud/bin/aarch64/ksuinit
        
    - name: Setup rustup
      run: |
        rustup update stable
        rustup target add x86_64-apple-darwin
        rustup target add aarch64-apple-darwin
        rustup target add aarch64-linux-android
    - uses: Swatinem/rust-cache@v2
      with:
        workspaces: userspace/ksud
        cache-targets: false
        cache-bin: false

    - name: Install cross
      run: |
        RUSTFLAGS="" cargo install cross --git https://github.com/cross-rs/cross --rev 66845c1

    - name: Build ksud
      env:
        BINDGEN_EXTRA_CLANG_ARGS_aarch64_linux_android: >
          --sysroot=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot
          -I$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include/aarch64-linux-android
          -I$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/sysroot/usr/include
      run: CROSS_NO_WARNINGS=0 cross build --target ${{ inputs.target }} --release --manifest-path ./userspace/ksud/Cargo.toml

    - name: Upload ksud artifact
      uses: actions/upload-artifact@v5
      with:
        name: ksud-${{ inputs.target }}
        path: userspace/ksud/target/**/release/ksud*
